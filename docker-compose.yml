services:
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9001:9001"   
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  spark:
    build:
      context: .
      dockerfile: docker/dockerfile.spark
    container_name: spark
    ports:
      - "8888:8888"
    volumes:
      - ./ingestion:/home/jovyan/ingestion
      - ./processing:/home/jovyan/processing
      - ./config:/home/jovyan/config
      - ./core:/home/jovyan/core
      - ./logs:/home/jovyan/logs
      - ./quality:/home/jovyan/quality
    working_dir: /home/jovyan
    environment:
      - PYTHONPATH=/home/jovyan
    depends_on:
      - minio
    command: >
      start-notebook.sh
      --NotebookApp.token=''
      --NotebookApp.password=''

  postgres:
    image: postgres:15
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Potyla643125&
      POSTGRES_DB: jobs_market_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  minio_data:
