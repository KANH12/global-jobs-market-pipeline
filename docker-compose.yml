services:
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9001:9001"   
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
  
    volumes:
      - minio_data:/data

  spark:
    build:
      context: .
      dockerfile: docker/dockerfile.spark
    container_name: spark
    ports:
      - "8888:8888"
    env_file:
      - .env
    volumes:
      - ./ingestion:/home/jovyan/ingestion
      - ./processing:/home/jovyan/processing
      - ./config:/home/jovyan/config
      - ./core:/home/jovyan/core
      - ./logs:/home/jovyan/logs
      - ./quality:/home/jovyan/quality
      - ./storage:/home/jovyan/storage
    working_dir: /home/jovyan
    environment:
      - PYTHONPATH=/home/jovyan
    depends_on:
      - minio
    command: >
      start-notebook.sh
      --NotebookApp.token=''
      --NotebookApp.password=''

  postgres:
    image: postgres:15
    container_name: postgres
    ports:
      - "5432:5432"
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: jobs_market_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  airflow-webserver:
    build:
      context: .
      dockerfile: docker/dockerfile.airflow
    container_name: airflow-webserver
    restart: always
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - .:/opt/project
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8080:8080"
    command: webserver

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/dockerfile.airflow
    container_name: airflow-scheduler
    restart: always
    depends_on:
      - airflow-webserver
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - .:/opt/project
      - /var/run/docker.sock:/var/run/docker.sock
    command: scheduler

volumes:
  minio_data:
  postgres_data:
